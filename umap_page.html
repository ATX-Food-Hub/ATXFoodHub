  <meta property="og:description" content="This interactive map highlights the various food resources available in and around UT Austin, serving a dual purpose in alleviating the effects of food insecurity. It provides students with a comprehensive, updated overview of the wide range of resources they can access while offering local nonprofits valuable insights into existing resource distribution, helping to identify gaps and improve management strategies.

**How to add updates to the map**: 
&lt;p&gt;Please fill out this &lt;a href=&quot;https://docs.google.com/forms/d/e/1FAIpQLSch2VEfYH0HOo6nLVtVA80ANG8w2hmjc_D5TfPsYolnSSijPA/viewform?usp=dialog&quot; target=&quot;_blank&quot;&gt;&lt;strong&gt;form&lt;/strong&gt;&lt;/a&gt; to share updates or new resources. Submissions will be reviewed and added as soon as possible!&lt;/p&gt;

**Other Programs that Can Help - Introducing SNAP, WIC, Fresh for Less Farmers Markets, Double Up Food Bucks, and More!**: 
&lt;p&gt;Need help accessing free groceries? Check out our &lt;a href=&quot;https://docs.google.com/document/d/13nLb7B-QnNZ6cIhCTdMHXwizMWp9QQ8kNPO3wpbNnv0/edit?usp=sharing&quot; target=&quot;_blank&quot;&gt;Resource Guide&lt;/a&gt;, which provides a detailed list of federal and local programs that support low-income and pregnant/postpartum individuals. It includes application instructions and contact information to help you get started.&lt;/p&gt;

 &lt;p&gt;UT Outpost offers &lt;strong&gt;SNAP application assistance&lt;/strong&gt; through one-on-one sessions with trained staff and student volunteers. These sessions walk you through the application process, help gather necessary documents, and answer questions to make applying easier. You can &lt;a href=&quot;https://deanofstudents.utexas.edu/sos/ut-outpost-snap-benefits.php&quot; target=&quot;_blank&quot;&gt;register for a SNAP session with UT Outpost here&lt;/a&gt;.&lt;/p&gt; 

&lt;p&gt;Join the &lt;strong&gt;UT Free Food channel&lt;/strong&gt; to get alerts when leftover food is available after campus events! To join, click &lt;a href=&quot;https://my.utexas.edu/student/ut_free_food/index&quot; target=&quot;_blank&quot;&gt;here&lt;/a&gt;.&lt;/p&gt; &lt;p&gt;If you have a valid SNAP EBT card, you can also shop for SNAP-eligible groceries on Amazon, Amazon Fresh, and Whole Foods. No Prime membership is required. Plus, you qualify for Amazon Access, which offers exclusive savings, a 50% discount on Prime, and free grocery delivery on orders over $35 with a 90-day free trial (just $4.99/month after). You can add your EBT/SNAP card to Amazon using this &lt;a href=&quot;https://www.amazon.com/b?node=19097785011&amp;linkCode=sl2&amp;tag=thefreebieg0e-20&amp;linkId=22769746c559732b6a566259362a47c0&amp;language=en_US&amp;ref_=as_li_ss_tl&quot; target=&quot;_blank&quot;&gt;link&lt;/a&gt;.&lt;/p&gt;

**Additional Resources Beyond UT Services**: 
Explore these websites to discover other local support options not affiliated with UT, including Fresh for Less Markets, community gardens, food pantries, and more.

- https://www.findhelp.org/
- https://unitedwayaustin.org/connectatx/
- https://www.centraltexasfoodbank.org/food-assistance/get-food-now" />
